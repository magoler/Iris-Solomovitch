<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>איריס שגיא סולומוביץ' · Portfolio</title>
  <meta name="description" content="תיק עבודות אדריכלות — איריס שגיא סולומוביץ'" />
  <link rel="stylesheet" href="css/styles.css?v=13" />
</head>
<body>
  <main class="viewport" id="viewport">
    <div class="stage" id="stage" aria-live="polite"></div>
  </main>

  <!-- bottom-center control bar: arrows flank the Table of Contents -->
  <nav class="navbar" aria-label="ניווט בספר">
    <button class="nav-arrow" id="nav-prev" aria-label="העמוד הקודם">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="navcenter">
      <button class="toc-toggle" id="toc-toggle" aria-haspopup="true" aria-expanded="false" aria-controls="toc-panel">
        תוכן עניינים
      </button>
      <span class="counter" id="counter"></span>
    </div>

    <button class="nav-arrow" id="nav-next" aria-label="העמוד הבא">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </nav>

  <div class="toc-panel" id="toc-panel" role="menu" aria-label="תוכן עניינים"></div>

  <!-- image lightbox: click any figure/cover image to view it large; pinch / wheel to zoom, drag to pan -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="תצוגת תמונה" aria-hidden="true">
    <button class="lightbox__close" id="lightbox-close" aria-label="סגירה" type="button">&times;</button>
    <div class="lightbox__stage" id="lightbox-stage">
      <img class="lightbox__img" id="lightbox-img" src="" alt="" draggable="false" />
      <!-- overview minimap, pinned to the image's bottom-left; shows the visible region while zoomed -->
      <div class="lightbox__map" id="lightbox-map" aria-hidden="true">
        <img class="lightbox__map-img" id="lightbox-map-img" alt="" draggable="false" />
        <div class="lightbox__map-view" id="lightbox-map-view"></div>
      </div>
    </div>
    <figcaption class="lightbox__cap" id="lightbox-cap"></figcaption>
  </div>

  <script src="js/content.js?v=4"></script>
  <script src="js/book.js?v=12"></script>
</body>
</html>
